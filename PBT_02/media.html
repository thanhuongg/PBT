<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm Multimedia</title>
</head>
<body>

    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="yellow" />
    </svg>

    <figure>
        <img src="https://i1-sohoa.vnecdn.net/2024/09/10/DSCF0384_1725924377-1725924646.jpg?w=1200&h=0&q=100&dpr=2&fit=crop&s=tp4Vn4sY6Y0bpY8ARHTt4g" width="400px" alt="Điện thoại iPhone 16 mặt trước" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Sản phẩm 1: iPhone 16</figcaption>
    </figure>

    <figure>
        <img src="https://images.pexels.com/photos/17838530/pexels-photo-17838530.jpeg" width="470px" alt="Máy tính Lenovo" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Sản phẩm 2: Laptop Lenovo</figcaption>
    </figure>

    <figure>
        <img src="https://tse1.mm.bing.net/th/id/OIP.-eZeaOO8QN022TsozLEUHgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Đồng hồ Apple Watch dây vải" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Sản phẩm 3: Apple Watch</figcaption>
    </figure>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/u_XVyDXs6fQ&list=RDu_XVyDXs6fQ&start_radio=1" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    <video controls poster="anhbia.png" width="600">
        <source src="video\intro .mp4" type="video/mp4">
        <source src="video\intro-.webm" type="video/webm">
    </video>

    <audio controls>
        <source src="audio\audio.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
