<!DOCTYPE html>

</table>
<form>

Phương thức thanh toán:
<input type="radio" name="payment" required> COD
<input type="radio" name="payment"> Chuyển khoản
<input type="radio" name="payment"> Ví điện tử

Mã giảm giá:
<input type="text" pattern="SALE[0-9]{4}">

Ghi chú:
<textarea></textarea>

Ngày giao hàng mong muốn:
<input type="date" min="2026-04-25">

Khung giờ:
<select>
    <option>Sáng 8-12h</option>
    <option>Chiều 14-18h</option>
    <option>Tối 18-21h</option>
</select>

Thời gian giao hàng:
<input type="range" min="1" max="7" step="1">

<button type="submit" aria-label="Xác nhận đặt hàng">Submit</button>

</form>
