<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>
<body>

    <h2>Đăng ký tài khoản</h2>

    <form action="#" method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ tên:</label>
            <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Ví dụ: Nguyễn Văn A"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="email@example.com"><br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Ví dụ: 0987654321"><br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-04-24"><br><br>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_]{3,20}" placeholder="Tên đăng nhập"><br><br>

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" placeholder="Mật khẩu"><br><br>

            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" placeholder="Nhập lại mật khẩu"><br><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="" disabled selected>-- Chọn Thành phố --</option>
                <option value="HN">Hà Nội</option>
                <option value="HCM">TP. Hồ Chí Minh</option>
                <option value="DN">Đà Nẵng</option>
                <option value="HP">Hải Phòng</option>
                <option value="CT">Cần Thơ</option>
            </select><br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district" required>
                <option value="" disabled selected>-- Chọn Quận/Huyện --</option>
                <option value="1">Quận 1</option>
                <option value="2">Quận Cầu Giấy</option>
                <option value="3">Quận Hải Châu</option>
            </select><br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea><br><br>

            <label>Giới tính:</label>
            <input type="radio" id="gender_male" name="gender" value="male">
            <label for="gender_male">Nam</label>
            
            <input type="radio" id="gender_female" name="gender" value="female">
            <label for="gender_female">Nữ</label>
            
            <input type="radio" id="gender_other" name="gender" value="other">
            <label for="gender_other">Khác</label><br><br>
        </fieldset>

        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">Tôi đồng ý với các điều khoản và điều kiện</label><br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm mới</button>
    </form>

</body>
</html>
